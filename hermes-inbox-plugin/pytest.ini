[pytest]
testpaths = tests
# The plugin ships a top-level __init__.py (it *is* the plugin module), so the
# default "prepend" import mode would walk up and import that package __init__
# — which pulls in hermes-agent-only modules and crashes at collection time.
# importlib mode imports test files standalone, avoiding the parent-package walk.
addopts = --import-mode=importlib
