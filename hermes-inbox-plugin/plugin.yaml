name: hermes-inbox
label: Hermes Inbox
kind: platform
version: 0.1.0
description: Deliver cron and webhook messages into the Hermes iOS app as first-class chat threads.
author: Hermes Dashboard
optional_env:
  - name: HERMES_INBOX_ENABLED
    description: Enable Hermes Inbox as a cron/webhook delivery target.
    password: false
  - name: HERMES_INBOX_HOME_CHANNEL
    description: Default inbox channel used by deliver=hermes_inbox.
    password: false

