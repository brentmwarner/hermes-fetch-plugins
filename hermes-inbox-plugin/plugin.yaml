name: hermes-inbox
label: Fetch Inbox
kind: platform
version: 0.1.1
description: Deliver cron and webhook messages into the Fetch iOS app as first-class chat threads.
author: Fetch
optional_env:
  - name: HERMES_INBOX_ENABLED
    description: Enable Fetch Inbox as a cron/webhook delivery target.
    password: false
  - name: HERMES_INBOX_HOME_CHANNEL
    description: Default inbox channel used by deliver=hermes_inbox.
    password: false
